name: Forex Bot - Run Every 5 Minutes

on:
  schedule:
    # Run every 5 minutes (*/5 in cron format)
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot cycle
        env:
          CAPITAL_IDENTIFIER: ${{ secrets.CAPITAL_IDENTIFIER }}
          CAPITAL_PASSWORD: ${{ secrets.CAPITAL_PASSWORD }}
          CAPITAL_DEMO_API_KEY: ${{ secrets.CAPITAL_DEMO_API_KEY }}
        run: |
          python main.py &
          sleep 30
          kill %1 2>/dev/null || true

      - name: Configure git and commit state.json
        run: |
          git config user.email "bot@forex-bot.local"
          git config user.name "Forex Bot"
          if ! git diff --quiet state.json; then
            git add state.json
            git commit -m "Update state.json - $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          fi

      - name: Push to main branch
        run: |
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
