name: Forex Bot - Run Every 5 Minutes

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot cycle
        env:
          CAPITAL_IDENTIFIER: ${{ secrets.CAPITAL_IDENTIFIER }}
          CAPITAL_PASSWORD: ${{ secrets.CAPITAL_PASSWORD }}
          CAPITAL_DEMO_API_KEY: ${{ secrets.CAPITAL_DEMO_API_KEY }}
        run: |
          timeout 30 python main.py || true

      - name: Configure git
        run: |
          git config user.email "bot@forex-bot.local"
          git config user.name "Forex Bot"

      - name: Commit and push state.json
        run: |
          if ! git diff --quiet state.json; then
            git add state.json
            git commit -m "Update state.json - $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
