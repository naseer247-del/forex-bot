name: Forex Trading Bot

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:         # allow manual trigger

permissions:
  contents: write            # needed to commit state.json

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading bot
        env:
          CAPITAL_DEMO_API_KEY: ${{ secrets.CAPITAL_DEMO_API_KEY }}
        run: python main.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f state.json ]; then
            git add state.json
            git diff --staged --quiet || git commit -m "Update state [skip ci]"
            git push
          else
            echo "state.json not found, skipping commit"
          fi
